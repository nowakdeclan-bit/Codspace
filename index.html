<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Club Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .club { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
        .event { background-color: #f9f9f9; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>School Clubs</h1>
    <div id="clubs">
        <!-- Clubs will be listed here -->
    </div>
    <h2>Upcoming Events</h2>
    <div id="events">
        <!-- Events will be listed here -->
    </div>
    <script>
        // Sample data
        const clubs = [
            { name: 'Art Club', description: 'Express your creativity!', signup: 'https://forms.google.com/signup-art' },
            { name: 'Science Club', description: 'Explore science!', signup: 'https://forms.google.com/signup-science' }
        ];
        const events = [
            { name: 'Art Exhibition', date: '2026-04-01', description: 'Showcase your art.' },
            { name: 'Science Fair', date: '2026-04-15', description: 'Present your projects.' }
        ];

        // Render clubs
        const clubsDiv = document.getElementById('clubs');
        clubs.forEach(club => {
            const div = document.createElement('div');
            div.className = 'club';
            div.innerHTML = `
                <h3>${club.name}</h3>
                <p>${club.description}</p>
                <a href="${club.signup}" target="_blank">Sign Up</a>
            `;
            clubsDiv.appendChild(div);
        });

        // Render events
        const eventsDiv = document.getElementById('events');
        events.forEach(event => {
            const div = document.createElement('div');
            div.className = 'event';
            div.innerHTML = `
                <h3>${event.name}</h3>
                <p>${event.description}</p>
                <p>Date: ${event.date}</p>
            `;
            eventsDiv.appendChild(div);
        });
    </script>
</body>
</html>
