<html>
<head>
    <title>My Club</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="https://cdn.auth0.com/js/auth0/9.18/auth0.min.js"></script>
    <script>
        const auth0 = new Auth0.WebAuth({
            domain: 'YOUR_DOMAIN',
            clientID: 'YOUR_CLIENT_ID',
            redirectUri: 'YOUR_REDIRECT_URI',
            responseType: 'token',
            scope: 'openid'
        });

        function loginWithGoogle() {
            auth0.authorize({ connection: 'google-oauth2' });
        }

        // Function to track user actions with cookies
        function trackUserAction(action) {
            document.cookie = `lastAction=${action}; path=/; expires=Fri, 31 Dec 9999 23:59:59 GMT`;
        }

        // Example of tracking user action
        document.addEventListener('click', function(event) {
            trackUserAction(event.target.id);
        });
    </script>
</head>
<body>
    <header>
        <h1>Welcome to My Club</h1>
        <div id="user-settings" style="position: absolute; top: 10px; right: 10px;">
            <img src="gear-icon.png" alt="Settings" onclick="loginWithGoogle()" style="cursor:pointer;" />
        </div>
    </header>
    <main>
        <section class="club-cards">
            <!-- Original club cards layout maintained here -->
            <div class="club-card">Card 1</div>
            <div class="club-card">Card 2</div>
            <div class="club-card">Card 3</div>
        </section>
    </main>
</body>
</html>
