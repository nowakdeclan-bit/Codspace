<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Club Management</title>

<style>
body {margin:0;font-family:Arial,sans-serif;color:white;transition:background 0.5s;}
.container{padding:20px;}
.clubs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-top:20px;}
.club-folder{background:rgba(0,0,0,0.3);padding:10px;border-radius:6px;}
.club-header h2{margin:0;}
.club-description{font-size:14px;}

/* Settings Wheel + Swatches */
#settingsWheel{
  position:fixed;
  top:10px;
  right:10px;
  width:40px;
  height:40px;
  cursor:pointer;
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
}
#settingsWheel svg{width:100%;height:100%;fill:white;}

/* Swatches container is centered on the wheel and swatches are positioned relative to that center */
#bgSwatches{
  position:absolute;
  top:50%;
  left:50%;
  width:0;
  height:0;
  transform:translate(-50%,-50%);
  pointer-events:none; /* enable per-swatch pointer-events */
}
.swatch{
  position:absolute;
  width:36px;
  height:36px;
  border-radius:8px;
  border:2px solid rgba(255,255,255,0.15);
  box-shadow:0 2px 6px rgba(0,0,0,0.35);
  cursor:pointer;
  opacity:0;
  /* Use CSS variables so per-swatch translate is preserved while scale animates */
  --tx: 0px;
  --ty: 0px;
  --s: 0.9;
  transform: translate(-50%,-50%) translate(var(--tx), var(--ty)) scale(var(--s));
  transition: opacity 0.15s ease, transform 0.15s ease;
  pointer-events:auto;
}

/* Positions around the center using CSS variables (translate applied via variables) */
.swatch.s1 { --tx: 0px;   --ty: -66px; }    /* top */
.swatch.s2 { --tx: 46px;  --ty: -36px; }    /* top-right */
.swatch.s3 { --tx: 46px;  --ty: 36px; }     /* bottom-right */
.swatch.s4 { --tx: 0px;   --ty: 66px; }     /* bottom */
.swatch.s5 { --tx: -46px; --ty: 36px; }     /* bottom-left */
.swatch.s6 { --tx: -46px; --ty: -36px; }    /* top-left */
.swatch.s7 { --tx: 80px;  --ty: 0px; }      /* far right (optional) */

/* When open, show swatches and set scale to 1 (keeps per-swatch translate) */
#settingsWheel.open #bgSwatches .swatch{
  opacity:1;
  --s:1;
}

/* Settings menu (unchanged except removed bg-selector) */
#settingsMenu{
  position:fixed;
  top:60px;
  right:10px;
  background:rgba(0,0,0,0.85);
  border-radius:8px;
  padding:10px;
  display:none;
  flex-direction:column;
  gap:10px;
  z-index:1000;
  min-width:150px;
}

#settingsMenu button{
  padding:6px 10px;
  border-radius:4px;
  border:none;
  cursor:pointer;
  background:#444;
  color:white;
}

#settingsMenu img{
  width:40px;
  border-radius:50%;
}

/* Keep existing bg selector styling removed from markup; this preserves layout for auth controls */
</style>
</head>

<body>

<!-- Settings Wheel -->
<div id="settingsWheel" title="Settings">
  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
    <!-- Stable gear path -->
    <path d="M19.14 12.94a7.14 7.14 0 0 0 0-1.88l2.03-1.58a0.5 0.5 0 0 0 .12-.65l-1.92-3.33a0.5 0.5 0 0 0-.6-.22l-2.39 1a7.41 7.41 0 0 0-1.62-.94l-.79-2.96A0.5 0.5 0 0 0 14.33 2h-4.66a0.5 0.5 0 0 0-.47.34l-.79 2.96a7.41 7.41 0 0 0-1.62.94l-2.39-1a0.5 0.5 0 0 0-.6.22L2.71 8.83a0.5 0.5 0 0 0 .12.65L4.86 11.06a7.14 7.14 0 0 0 0 1.88L2.83 14.52a0.5 0.5 0 0 0-.12.65l1.92 3.33a0.5 0.5 0 0 0 .6.22l2.39-1c.5.36 1.06.66 1.62.94l.79 2.96a0.5 0.5 0 0 0 .47.34h4.66a0.5 0.5 0 0 0 .47-.34l.79-2.96c.56-.28 1.12-.58 1.62-.94l2.39 1a0.5 0.5 0 0 0 .6-.22l1.92-3.33a0.5 0.5 0 0 0-.12-.65l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 15.5 12 3.5 3.5 0 0 1 12 15.5z"/>
  </svg>

  <!-- Swatches will be injected here -->
  <div id="bgSwatches" aria-hidden="true"></div>
</div>

<!-- Settings Menu -->
<div id="settingsMenu">
  <div id="authMenu"></div>
  <!-- Backgrounds moved to wheel swatches -->
</div>

<div class="container">
<h1>🎓 School Clubs</h1>
<div class="clubs-grid"></div>
</div>

<!-- Auth0 & Supabase -->
<script src="https://cdn.auth0.com/js/auth0-spa-js/2.1/auth0-spa-js.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
let auth0Client;
let user = null;
const admins = ["nowakdeclan@gmail.com"];

const supabaseUrl = "https://ebopabdywvtgnyzzncwm.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVib3BhYmR5d3Z0Z255enpuY3dtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTE3NzIsImV4cCI6MjA4OTY4Nzc3Mn0.8V8GpFpGC[...]";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

// Toggle settings menu & swatches
document.getElementById('settingsWheel').onclick = () => {
  const menu = document.getElementById('settingsMenu');
  const wheel = document.getElementById('settingsWheel');
  const swatches = document.getElementById('bgSwatches');

  const isOpen = menu.style.display === 'flex';
  menu.style.display = isOpen ? 'none' : 'flex';
  // toggle swatches visibility and class
  if(isOpen){
    wheel.classList.remove('open');
    swatches.setAttribute('aria-hidden', 'true');
  } else {
    wheel.classList.add('open');
    swatches.setAttribute('aria-hidden', 'false');
  }
};

window.onload = async () => {
  // build swatches into the wheel
  buildBgSwatches();

  auth0Client = await auth0.createAuth0Client({
    domain: "dev-7zkwepz701chykhp.us.auth0.com",
    client_id: "I2BpaqWwKIgwogQYpDDA0qiMBPgeXw4e",
    authorizationParams: {
      redirect_uri: window.location.origin
    },
    cacheLocation: "localstorage",
    useRefreshTokens: true
  });

  if (window.location.search.includes("code=")) {
    await auth0Client.handleRedirectCallback();
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  await updateUI();
  await loadClubs();
};

async function updateUI(){
  const authDiv = document.getElementById("authMenu");
  authDiv.innerHTML = "";

  const isAuth = await auth0Client.isAuthenticated();

  if(isAuth){
    user = await auth0Client.getUser();

    const img = document.createElement("img");
    img.src = user.picture || "";
    authDiv.appendChild(img);

    const logoutBtn = document.createElement("button");
    logoutBtn.innerText = "Logout";
    logoutBtn.onclick = () => auth0Client.logout({ logoutParams: { returnTo: window.location.origin }});
    authDiv.appendChild(logoutBtn);

    if(user && admins.includes(user.email)){
      const addBtn = document.createElement("button");
      addBtn.innerText = "➕ Add Club";

      addBtn.onclick = async () => {
        const name = prompt("Club Name:");
        if(!name) return;
        const desc = prompt("Description:");

        const { error } = await supabaseClient
          .from("clubs")
          .insert([{ name, description: desc }]);

        if(error) alert("Error: " + error.message);
        else {
          alert("Club added!");
          loadClubs();
        }
      };

      authDiv.appendChild(addBtn);
    }

  } else {
    const loginBtn = document.createElement("button");
    loginBtn.innerText = "Login with Google";
    loginBtn.onclick = () => auth0Client.loginWithRedirect();
    authDiv.appendChild(loginBtn);
  }
}

// Backgrounds map (same gradients used by changeBackground)
const bgMap = {
  default: "linear-gradient(135deg,#667eea,#764ba2)",
  greenorange: "linear-gradient(135deg,#00b09b,#96c93d)",
  bluepink: "linear-gradient(135deg,#2193b0,#6dd5ed)",
  sunset: "linear-gradient(135deg,#ff7e5f,#feb47b)",
  forest: "linear-gradient(135deg,#134e5e,#71b280)",
  sunrise: "linear-gradient(135deg,#ff512f,#dd2476)",
  ocean: "linear-gradient(135deg,#2E8BC0,#B1D4E0)"
};

function changeBackground(val){
  const map = bgMap;
  if(!map[val]) val = "default";
  document.body.style.background = map[val];
  localStorage.setItem("bgChoice", val);
}

changeBackground(localStorage.getItem("bgChoice") || "default");

// Create swatches around the wheel
function buildBgSwatches(){
  const swatchesContainer = document.getElementById('bgSwatches');
  swatchesContainer.innerHTML = ''; // clear

  const keys = Object.keys(bgMap);
  // desired positions: 7 swatches approximate; use s1..s7 CSS classes
  keys.forEach((key, idx) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'swatch s' + (idx + 1);
    btn.title = key;
    btn.setAttribute('aria-label', 'Background ' + key);
    btn.style.background = bgMap[key];
    btn.onclick = (e) => {
      e.stopPropagation(); // don't toggle wheel/menu when clicking a swatch
      changeBackground(key);
      // optionally close the menu after selection
      document.getElementById('settingsMenu').style.display = 'none';
      const wheel = document.getElementById('settingsWheel');
      wheel.classList.remove('open');
      swatchesContainer.setAttribute('aria-hidden', 'true');
    };
    swatchesContainer.appendChild(btn);
  });

  // start hidden
  swatchesContainer.setAttribute('aria-hidden', 'true');
}

// Load clubs
async function loadClubs(){
  const grid = document.querySelector(".clubs-grid");
  grid.innerHTML = "";

  const { data, error } = await supabaseClient.from("clubs").select("*");

  if(error){
    grid.innerHTML = "<p>Error loading clubs.</p>";
    return;
  }

  if(!data || !data.length){
    grid.innerHTML = "<p>No clubs yet.</p>";
    return;
  }

  data.forEach(club => {
    const div = document.createElement("div");
    div.className = "club-folder";

    const header = document.createElement("div");
    header.className = "club-header";

    const h2 = document.createElement("h2");
    h2.textContent = club.name || "Untitled";
    header.appendChild(h2);

    if(club.description){
      const p = document.createElement("p");
      p.className = "club-description";
      p.textContent = club.description;
      header.appendChild(p);
    }

    div.appendChild(header);
    grid.appendChild(div);
  });
}
</script>

<script>
  // Legacy/alternate club loader (kept for compatibility, but note it uses #grid which doesn't exist;
  // if you want to use it, change #grid to .clubs-grid or remove this block)
  const grid = document.getElementById("grid");

  if(grid){
    fetch('clubs.json')
      .then(response => response.json())
      .then(data => {
        data.forEach(club => {
          const div = document.createElement("div");
          div.className = "club-folder";

          const header = document.createElement("div");
          header.className = "club-header";

          const h2 = document.createElement("h2");
          h2.textContent = club.name || "Untitled";
          header.appendChild(h2);

          if(club.description){
            const p = document.createElement("p");
            p.className = "club-description";
            p.textContent = club.description;
            header.appendChild(p);
          }

          div.appendChild(header);
          grid.appendChild(div);
        });
      })
      .catch(error => console.error("Error loading clubs:", error));
  }
</script>

</body>
</html>
