<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>School Club Management</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 40px 20px; } .container { max-width: 1200px; margin: 0 auto; } h1 { color: white; text-align: center; margin-bottom: 50px; font-size: 3em; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3); } .clubs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; margin-bottom: 50px; } .club-folder { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer; } .club-folder:hover { transform: translateY(-10px); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3); } .club-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; } .club-header h2 { font-size: 2em; margin-bottom: 10px; } .club-description { font-size: 1.1em; opacity: 0.9; } .club-content { padding: 30px; } .signup-btn { display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 30px; border: none; border-radius: 25px; font-size: 1em; cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; margin-bottom: 20px; text-decoration: none; width: 100%; text-align: center; } .signup-btn:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); } .section-title { font-size: 1.3em; color: #333; margin-bottom: 15px; font-weight: bold; border-bottom: 2px solid #667eea; padding-bottom: 10px; } </style> </head> <body> <div class="container"> <h1>🎓 School Clubs</h1> <div class="clubs-grid"> <!-- Raptor Reportz --> <div class="club-folder"> <div class="club-header"> <h2>Raptor Reportz</h2> </div> <div class="club-content"> </div> </div> <!-- Chess Club --> <div class="club-folder"> <div class="club-header"> <h2>Chess Club</h2> <p class="club-description">Excel Only</p> </div> <div class="club-content"> </div> </div> <!-- Excel --> <div class="club-folder"> <div class="club-header"> <h2>Excel</h2> </div> <div class="club-content"> </div> </div> </div> </div> </body> </html>
