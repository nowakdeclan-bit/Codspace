<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Club Management</title>
    <!-- Auth0 SDK -->
    <script src="https://cdn.auth0.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* --- Settings Gear Styles --- */
        .settings-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        .gear-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            transition: background 0.3s, transform 0.3s;
        }

        .gear-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(45deg);
        }

        .dropdown-menu {
            position: absolute;
            top: 55px;
            right: 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 10px;
            display: none; /* Hidden by default */
            min-width: 150px;
        }

        .dropdown-menu.show {
            display: block;
        }

        .auth-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-align: left;
            background: none;
            color: #333;
        }

        .auth-btn:hover {
            background: #f0f0f0;
        }

        .user-info {
            padding: 10px;
            font-size: 0.9em;
            border-bottom: 1px solid #eee;
            margin-bottom: 5px;
            display: none;
        }
        /* --- End Settings Styles --- */
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 50px;
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }
        
        .clubs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .club-folder {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .club-folder:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        
        .club-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .club-header h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <!-- Settings Gear & Auth Menu -->
    <div class="settings-container">
        <button class="gear-btn" onclick="toggleDropdown()">⚙️</button>
        <div class="dropdown-menu" id="dropdown">
            <div id="user-profile" class="user-info"></div>
            <button id="btn-login" class="auth-btn" onclick="login()">Sign In with Google</button>
            <button id="btn-logout" class="auth-btn" style="display:none" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div class="container">
        <h1>🎓 School Clubs</h1>
        
        <div class="clubs-grid">
            <div class="club-folder">
                <div class="club-header"><h2>Raptor Reportz</h2></div>
            </div>
            <div class="club-folder">
                <div class="club-header">
                    <h2>Chess Club</h2>
                    <p>Excel Only</p>
                </div>
            </div>
            <div class="club-folder">
                <div class="club-header"><h2>Excel</h2></div>
            </div>
        </div>
    </div>

    <script>
        let auth0 = null;

        // Initialize Auth0 client
        const configureClient = async () => {
            auth0 = await createAuth0Client({
                domain: "dev-7zkwepz701chykhp.us.auth0.com",
                client_id: "I2BpaqWwKIgwogQYpDDA0qiMBPgeXw4e"
            });
        };

        window.onload = async () => {
            await configureClient();

            // Handle callback if returning from login
            const query = window.location.search;
            if (query.includes("code=") && query.includes("state=")) {
                await auth0.handleRedirectCallback();
                window.history.replaceState({}, document.title, "/");
            }

            updateUI();
        };

        const updateUI = async () => {
            const isAuthenticated = await auth0.isAuthenticated();
            const loginBtn = document.getElementById("btn-login");
            const logoutBtn = document.getElementById("btn-logout");
            const userProfile = document.getElementById("user-profile");

            if (isAuthenticated) {
                const user = await auth0.getUser();
                loginBtn.style.display = "none";
                logoutBtn.style.display = "block";
                userProfile.style.display = "block";
                userProfile.innerHTML = `Signed in as:<br><strong>${user.name}</strong>`;
            } else {
                loginBtn.style.display = "block";
                logoutBtn.style.display = "none";
                userProfile.style.display = "none";
            }
        };

        const login = async () => {
            await auth0.loginWithRedirect({
                authorizationParams: {
                    redirect_uri: window.location.origin,
                    connection: 'google-oauth2' // Forces Google login
                }
            });
        };

        const logout = () => {
            auth0.logout({
                logoutParams: {
                    returnTo: window.location.origin
                }
            });
        };

        function toggleDropdown() {
            document.getElementById("dropdown").classList.toggle("show");
        }

        // Close dropdown if clicked outside
        window.onclick = function(event) {
            if (!event.target.matches('.gear-btn')) {
                const dropdown = document.getElementById("dropdown");
                if (dropdown.classList.contains('show')) {
                    dropdown.classList.remove('show');
                }
            }
        }
    </script>
</body>
</html>
