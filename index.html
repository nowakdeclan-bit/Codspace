<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Club Management</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 40px 20px;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
}

h1 {
  color: white;
  text-align: center;
  margin-bottom: 50px;
  font-size: 3em;
}

/* TOP RIGHT GEAR */
.top-bar {
  position: absolute;
  top: 20px;
  right: 20px;
}

.gear {
  font-size: 28px;
  cursor: pointer;
  color: white;
}

.auth-menu {
  display: none;
  position: absolute;
  right: 0;
  margin-top: 10px;
  background: white;
  border-radius: 10px;
  padding: 10px;
}

.auth-menu button {
  display: block;
  width: 200px;
  margin: 5px 0;
  padding: 10px;
  border: none;
  background: #667eea;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

.user-info {
  color: white;
  text-align: right;
  margin-bottom: 10px;
}

.clubs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 30px;
}

.club-folder {
  background: white;
  border-radius: 15px;
  overflow: hidden;
}

.club-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 30px;
  text-align: center;
}

.club-content {
  padding: 30px;
}
</style>
</head>

<body>

<div class="top-bar">
  <div class="gear" onclick="toggleMenu()">⚙️</div>

  <div id="authMenu" class="auth-menu">
    <button onclick="login()">Login with Google</button>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<div class="container">
  <div id="userInfo" class="user-info"></div>

  <h1>🎓 School Clubs</h1>

  <div class="clubs-grid">

    <div class="club-folder">
      <div class="club-header">
        <h2>Raptor Reportz</h2>
      </div>
      <div class="club-content"></div>
    </div>

    <div class="club-folder">
      <div class="club-header">
        <h2>Chess Club</h2>
        <p>Excel Only</p>
      </div>
      <div class="club-content"></div>
    </div>

    <div class="club-folder">
      <div class="club-header">
        <h2>Excel</h2>
      </div>
      <div class="club-content"></div>
    </div>

  </div>
</div>

<script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>

<script>
let auth0Client = null;

async function configureClient() {
  auth0Client = await auth0.createAuth0Client({
    domain: "dev-7zkwepz701chykhp.us.auth0.com",
    clientId: "sFJNJmf0HSXehaKMhHfw9WLAnN90P3Bf",
    authorizationParams: {
      redirect_uri: window.location.origin
    }
  });
}

async function login() {
  await auth0Client.loginWithRedirect({
    authorizationParams: {
      connection: "google-oauth2"
    }
  });
}

function logout() {
  auth0Client.logout({
    logoutParams: {
      returnTo: window.location.origin
    }
  });
}

function toggleMenu() {
  const menu = document.getElementById("authMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

async function updateUI() {
  const isAuthenticated = await auth0Client.isAuthenticated();

  if (isAuthenticated) {
    const user = await auth0Client.getUser();
    document.getElementById("userInfo").innerText =
      "Logged in as: " + user.name;
  }
}

window.onload = async () => {
  await configureClient();

  if (window.location.search.includes("code=")) {
    await auth0Client.handleRedirectCallback();
    window.history.replaceState({}, document.title, "/");
  }

  updateUI();
};
</script>

</body>
</html>
