backend:
  name: github
  repo: your-github-username/your-repo-name # 👈 CHANGE THIS
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "data"
    label: "Club List"
    files:
      - label: "All Clubs"
        name: "clubs_file"
        file: "clubs.json" # Points to the file you just made
        fields:
          - label: "Clubs"
            name: "items"
            widget: "list" # This creates the "Add" button in the admin panel!
            fields:
              - { label: "Club Name", name: "name", widget: "string" }
              - { label: "Description", name: "description", widget: "string" }
